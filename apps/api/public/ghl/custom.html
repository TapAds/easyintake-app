<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Easy Intake — GoHighLevel</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 0 0 8px 0; color: #fff; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-bottom: 24px; }
    .card { background: #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
    .card h2 { font-size: 0.8125rem; margin: 0 0 12px 0; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .info { font-size: 0.875rem; color: #94a3b8; }
    .badge { display: inline-block; background: #334155; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-family: ui-monospace, monospace; color: #cbd5e1; margin: 2px 4px 2px 0; }
    .status { color: #22c55e; font-weight: 500; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Easy Intake</h1>
    <p class="subtitle">Turn conversations into structured data</p>

    <div class="card">
      <h2>Status</h2>
      <p class="info"><span class="status">Connected to GoHighLevel</span></p>
    </div>

    <div class="card">
      <h2>Context</h2>
      <p class="info">
        <span id="locationInfo">Loading…</span>
      </p>
    </div>

    <div class="card">
      <h2>What's Next</h2>
      <p class="info">
        Voice intake runs via your Twilio number. Completed calls sync contacts and opportunities to this location.
        <br><br>
        <a href="/public/agent.html" target="_blank">Agent UI</a> — real-time view during active calls.
      </p>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const locationId = params.get('location_id') || params.get('location.id');
      const userId = params.get('user_id') || params.get('user.id');

      const el = document.getElementById('locationInfo');
      if (locationId || userId) {
        const parts = [];
        if (locationId) parts.push('<span class="badge">location: ' + locationId + '</span>');
        if (userId) parts.push('<span class="badge">user: ' + userId + '</span>');
        el.innerHTML = parts.length ? parts.join(' ') : 'No context passed.';
      } else {
        el.textContent = 'No context passed. Configure Custom Page URL with {{location.id}} and {{user.id}}.';
      }
    })();
  </script>
</body>
</html>
